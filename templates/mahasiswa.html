<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Mahasiswa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">Sistem Perpustakaan</div>
    <div class="sidebar-menu">
        <a href="/">Dashboard</a>
        <a href="/buku">Data Buku</a>
        <a href="/mahasiswa" class="active">Data Mahasiswa</a>
        <a href="/peminjaman">Peminjaman</a>
        <a href="/riwayat">Riwayat</a>
    </div>
</div>

<div class="main-content">
    <h1>Kelola Data Mahasiswa</h1>

    <form method="POST" action="/tambah_mahasiswa">
        <input type="text" name="nim" placeholder="Nomor Induk Mahasiswa (NIM)" required>
        <input type="text" name="nama" placeholder="Nama Lengkap" required>
        <input type="text" name="prodi" placeholder="Program Studi" required>
        <button type="submit">Tambah</button>
    </form>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Program Studi</th>
                </tr>
            </thead>
            <tbody>
                {% for item in mahasiswa %}
                <tr>
                    <td style="font-weight: 600; color: var(--text-title);">{{ item.nim }}</td>
                    <td>{{ item.nama }}</td>
                    <td>{{ item.prodi }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
